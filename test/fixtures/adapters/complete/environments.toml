schema = "benchpilot.adapter.environments"
schema_version = 1
[environments.inherit]
strategy = "inherit"
[environments.active]
strategy = "first-valid"
[[environments.active.providers]]
id = "current"
type = "active"
priority = 10
required_variables = ["PATH"]
[environments.static]
strategy = "first-valid"
[[environments.static.providers]]
id = "values"
type = "static"
priority = 1
[environments.static.providers.variables]
PATH = "${env.PATH}"
[environments.capture]
strategy = "first-valid"
[[environments.capture.providers]]
id = "script"
type = "capture-script"
priority = 1
script = "${config.export_script}"
shell = "posix"
