schema = "benchpilot.adapter.cases"
schema_version = 1
[[cases]]
id = "render-run"
type = "render-action"
platform = "linux"
target = "run"
[cases.context.device]
project = "project"
port = "COM1"
[cases.context.input]
target = "app"
verbose = true
tags = ["one", "two"]
[cases.expect]
tool = "script"
cwd = "project"
args = ["build", "app", "--port", "COM1", "--verbose", "--tag", "one", "--tag", "two"]
environment = { BUILD_TARGET = "app" }

[[cases]]
id = "parse-text"
type = "parse-output"
platform = "linux"
target = "text"
stdout_fixture = "fixtures/output.txt"
stderr_fixture = "fixtures/error.txt"
exit_code = 0
[cases.context]
[cases.expect]
success = true
result = { version = 3 }
progress = [
  { event = "build.progress", data = { current = 1 } },
  { event = "build.progress", data = { current = 2 } },
  { event = "build.warning", data = { code = 9 } }
]

[[cases]]
id = "parse-error"
type = "parse-output"
platform = "linux"
target = "text"
stdout_fixture = "fixtures/output.txt"
stderr_fixture = "fixtures/error-match.txt"
exit_code = 1
[cases.context]
[cases.expect]
success = false
error = { kind = "ERROR", retryable = true }

[[cases]]
id = "parse-json"
type = "parse-output"
platform = "linux"
target = "json"
stdout_fixture = "fixtures/output.json"
exit_code = 0
[cases.context]
[cases.expect]
success = true
result = { name = "first" }

[[cases]]
id = "plan-deploy"
type = "plan-workflow"
platform = "linux"
target = "deploy"
[cases.context.input]
target = "app"
[cases.expect]
steps = [{ id = "run", uses = "action:run", with = { target = "app" }, continue_on_error = true }]

[[cases]]
id = "plan-artifacts"
type = "resolve-artifacts"
platform = "linux"
target = "output"
[cases.context.device]
project = "project"
[cases.expect]
entries = [
  { id = "output", path = "project/output.json", required = false, multiple = false },
  { id = "logs", glob = "project/*.log", required = false, multiple = true }
]
