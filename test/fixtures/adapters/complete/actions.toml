schema = "benchpilot.adapter.actions"
schema_version = 1
[actions.run]
type = "process"
tool = "script"
cwd = "${device.project}"
env = { BUILD_TARGET = "${input.target}" }
arguments = [
  { kind = "literal", value = "build" },
  { kind = "value", value = "${input.target}" },
  { kind = "option", flag = "--port", value = "${device.port}" },
  { kind = "flag", flag = "--verbose", when = { path = "input.verbose", operator = "truthy" } },
  { kind = "repeat", values = "${input.tags}", prefix = "--tag" }
]
[actions.logs]
type = "serial-read"
port = "${device.port}"
baud = "${input.baud}"
duration = "${input.duration}"
encoding = "utf8"
line_mode = true
[actions.copy]
type = "copy"
from = "${device.project}"
to = "${device.destination}"
recursive = true
overwrite = true
