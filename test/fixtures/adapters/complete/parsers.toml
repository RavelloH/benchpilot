schema = "benchpilot.adapter.parsers"
schema_version = 1
[parsers.text]
mode = "line"
encoding = "utf8"
strip_ansi = true
success_exit_codes = [0]
[[parsers.text.extract]]
id = "version"
source = "stdout"
type = "regex"
pattern = "version=(?<value>\\d+)"
target = "version"
group = "value"
cast = "integer"
required = true
[[parsers.text.progress]]
id = "progress"
source = "stdout"
pattern = "progress=(?<current>\\d+)"
event = "build.progress"
[parsers.text.progress.fields]
current = "integer"
[[parsers.text.errors]]
id = "first"
priority = 10
source = "stderr"
pattern = "fatal"
kind = "FATAL"
retryable = false
recovery = []
[[parsers.text.errors]]
id = "second"
priority = 1
source = "stderr"
pattern = "error"
kind = "ERROR"
retryable = true
recovery = ["Retry"]
