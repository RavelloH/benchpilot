schema = "benchpilot.adapter.devices"
schema_version = 1
[discovery]
enabled = true
[[discovery.sources]]
id = "serial"
type = "serial"
[[discovery.matchers]]
id = "serial-present"
source = "serial"
field = "serial"
operator = "exists"
score = 10
[discovery.result]
minimum_score = 10
[identity]
fields = ["device.serial"]
allow_port_fallback = false
