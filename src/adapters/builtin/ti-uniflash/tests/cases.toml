schema = "benchpilot.adapter.cases"
schema_version = 1

[[cases]]
id = "render-flash-verified-run"
type = "render-action"
platform = "windows"
target = "flash"
[cases.context.project]
root = "E:/firmware"
[cases.context.device]
target_config = "E:/firmware/tools/target.ccxml"
probe_id = "lab-xds110-01"
target_name = "Example target"
[cases.context.input]
image = "E:/firmware/build/application.out"
verify = true
run_after_flash = true
[cases.expect]
tool = "dslite"
cwd = "E:/firmware"
args = ["flash", "--config", "E:/firmware/tools/target.ccxml", "--flash", "--verify", "--run", "E:/firmware/build/application.out"]

