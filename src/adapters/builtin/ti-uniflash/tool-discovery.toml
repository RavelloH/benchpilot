schema = "benchpilot.adapter.tool-discovery"
schema_version = 1

[discoveries.python]
strategy = "first-valid"
[[discoveries.python.candidates]]
id = "config"
type = "config"
priority = 100
key = "python_path"
[[discoveries.python.candidates]]
id = "path"
type = "path"
priority = 50
names = ["python3", "python"]
[discoveries.python.validation]
path_type = "file"
executable = true
[discoveries.python.persistence]
key = "python_path"
source = "path"
[discoveries.python.probe]
args = ["-c", "import serial; print('pyserial')"]
parser = "python-serial"
timeout = "10s"

[discoveries.python-stdlib]
strategy = "first-valid"
[[discoveries.python-stdlib.candidates]]
id = "config"
type = "config"
priority = 100
key = "python_path"
[[discoveries.python-stdlib.candidates]]
id = "path"
type = "path"
priority = 50
names = ["python3", "python"]
[discoveries.python-stdlib.validation]
path_type = "file"
executable = true
[discoveries.python-stdlib.persistence]
key = "python_path"
source = "path"
[discoveries.python-stdlib.probe]
args = ["--version"]
parser = "python-version"
timeout = "10s"

[discoveries.dslite]
strategy = "first-valid"
[[discoveries.dslite.candidates]]
id = "config"
type = "config"
priority = 100
key = "dslite_path"
[[discoveries.dslite.candidates]]
id = "uniflash-root"
type = "environment-path"
priority = 90
variable = "UNIFLASH_ROOT"
append = ["deskdb", "content", "TICloudAgent", "win", "ccs_base", "DebugServer", "bin", "DSLite.exe"]
[[discoveries.dslite.candidates]]
id = "path"
type = "path"
priority = 50
names = ["DSLite.exe", "DSLite"]
[[discoveries.dslite.candidates]]
id = "windows-uniflash"
type = "glob"
priority = 20
patterns = [
  "D:/ti/uniflash_*/deskdb/content/TICloudAgent/win/ccs_base/DebugServer/bin/DSLite.exe",
  "C:/ti/uniflash_*/deskdb/content/TICloudAgent/win/ccs_base/DebugServer/bin/DSLite.exe",
  "C:/ti/ccs*/ccs/ccs_base/DebugServer/bin/DSLite.exe"
]
[discoveries.dslite.candidates.platforms]
windows = true
linux = false
macos = false
[discoveries.dslite.validation]
path_type = "file"
executable = false
[discoveries.dslite.persistence]
key = "dslite_path"
source = "path"
[discoveries.dslite.probe]
args = ["flash", "-h"]
parser = "dslite-flash-help"
timeout = "10s"

[discoveries.make]
strategy = "first-valid"
[[discoveries.make.candidates]]
id = "config"
type = "config"
priority = 100
key = "make_path"
[[discoveries.make.candidates]]
id = "path"
type = "path"
priority = 50
names = ["mingw32-make.exe", "make.exe", "mingw32-make", "make"]
[discoveries.make.validation]
path_type = "file"
executable = true
[discoveries.make.persistence]
key = "make_path"
source = "path"
[discoveries.make.probe]
args = ["--version"]
parser = "make-version"
timeout = "10s"

[discoveries.cmake]
strategy = "first-valid"
[[discoveries.cmake.candidates]]
id = "config"
type = "config"
priority = 100
key = "cmake_path"
[[discoveries.cmake.candidates]]
id = "path"
type = "path"
priority = 50
names = ["cmake.exe", "cmake"]
[discoveries.cmake.validation]
path_type = "file"
executable = true
[discoveries.cmake.persistence]
key = "cmake_path"
source = "path"
[discoveries.cmake.probe]
args = ["--version"]
parser = "cmake-version"
timeout = "10s"
