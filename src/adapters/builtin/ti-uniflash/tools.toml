schema = "benchpilot.adapter.tools"
schema_version = 1

[tools.python]
description = "Python runtime used by bounded serial capture."
required = false
discovery = "python"
[tools.python.launch]
mode = "direct"
command = "python"
prefix_args = []
environment = "inherit"

[tools.python-stdlib]
description = "Python runtime used for non-hardware prebuilt-image inspection."
required = false
discovery = "python-stdlib"
[tools.python-stdlib.launch]
mode = "direct"
command = "python"
prefix_args = []
environment = "inherit"

[tools.dslite]
description = "TI Debug Server Scripting executable installed with UniFlash or Code Composer Studio."
required = true
discovery = "dslite"
[tools.dslite.launch]
mode = "direct"
command = "DSLite"
prefix_args = []
environment = "inherit"

[tools.make]
description = "Make executable used by the explicitly declared Make build backend."
required = false
discovery = "make"
[tools.make.launch]
mode = "direct"
command = "make"
prefix_args = []
environment = "inherit"

[tools.cmake]
description = "CMake executable used by the explicitly declared CMake build backend."
required = false
discovery = "cmake"
[tools.cmake.launch]
mode = "direct"
command = "cmake"
prefix_args = []
environment = "inherit"
