schema = "benchpilot.adapter.tools"
schema_version = 1

[tools.python]
description = "Python runtime used by bounded serial capture."
required = false
discovery = "python"
[tools.python.launch]
mode = "direct"
command = "python"
prefix_args = []
environment = "inherit"

[tools.dslite]
description = "TI Debug Server Scripting executable installed with UniFlash or Code Composer Studio."
required = true
discovery = "dslite"
[tools.dslite.launch]
mode = "direct"
command = "DSLite"
prefix_args = []
environment = "inherit"
