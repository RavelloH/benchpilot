schema = "benchpilot.adapter.views"
schema_version = 1

[capabilities.status]
kind = "detail"
[capabilities.status.title]
key = "view.status.title"
fallback = "Target readiness"
[[capabilities.status.fields]]
selector = "connection.endpoint"
formatter = "string"
[capabilities.status.fields.label]
key = "view.status.field.endpoint"
fallback = "Debug probe"
[[capabilities.status.fields]]
selector = "target.model"
formatter = "string"
[capabilities.status.fields.label]
key = "view.status.field.model"
fallback = "Target"
[[capabilities.status.fields]]
selector = "target.revision"
formatter = "string"
[capabilities.status.fields.label]
key = "view.status.field.revision"
fallback = "Revision"
[[capabilities.status.fields]]
selector = "tooling.dslite"
formatter = "string"
[capabilities.status.fields.label]
key = "view.status.field.dslite"
fallback = "DSLite"

[capabilities.info]
kind = "detail"
[capabilities.info.title]
key = "view.info.title"
fallback = "Target inventory"
[[capabilities.info.fields]]
selector = "identity.model"
formatter = "string"
[capabilities.info.fields.label]
key = "view.info.field.model"
fallback = "Model"
[[capabilities.info.fields]]
selector = "identity.revision"
formatter = "string"
[capabilities.info.fields.label]
key = "view.info.field.revision"
fallback = "Revision"
[[capabilities.info.fields]]
selector = "identity.hardware_id"
formatter = "string"
[capabilities.info.fields.label]
key = "view.info.field.hardware_id"
fallback = "Hardware ID"
[[capabilities.info.fields]]
selector = "hardware.flash.manufacturer"
formatter = "string"
[capabilities.info.fields.label]
key = "view.info.field.flash_manufacturer"
fallback = "Flash manufacturer"
[[capabilities.info.fields]]
selector = "hardware.flash.device"
formatter = "string"
[capabilities.info.fields.label]
key = "view.info.field.flash_device"
fallback = "Flash device"
[[capabilities.info.fields]]
selector = "hardware.flash.size"
formatter = "string"
[capabilities.info.fields.label]
key = "view.info.field.flash_size"
fallback = "Flash size"
[[capabilities.info.fields]]
selector = "tooling.dslite"
formatter = "string"
[capabilities.info.fields.label]
key = "view.info.field.dslite"
fallback = "DSLite"

[capabilities.flash]
kind = "completion"
[capabilities.flash.message]
key = "view.flash.completed"
fallback = "Firmware flashing completed."

[capabilities.reset]
kind = "completion"
[capabilities.reset.message]
key = "view.reset.completed"
fallback = "Target reset completed."

[capabilities.capture]
kind = "detail"
[capabilities.capture.title]
key = "view.capture.title"
fallback = "Capture summary"
[[capabilities.capture.fields]]
selector = "lines"
formatter = "string"
[capabilities.capture.fields.label]
key = "view.field.lines"
fallback = "Lines"
[[capabilities.capture.fields]]
selector = "bytes"
formatter = "string"
[capabilities.capture.fields.label]
key = "view.field.bytes"
fallback = "Bytes"
[[capabilities.capture.fields]]
selector = "stop_reason"
formatter = "string"
[capabilities.capture.fields.label]
key = "view.field.stop_reason"
fallback = "Stop reason"

[capabilities.run]
kind = "detail"
[capabilities.run.title]
key = "view.session.run.title"
fallback = "Managed serial session"
[[capabilities.run.fields]]
selector = "sessionId"
formatter = "string"
[capabilities.run.fields.label]
key = "view.session.field.id"
fallback = "Session"
[[capabilities.run.fields]]
selector = "status"
formatter = "string"
[capabilities.run.fields.label]
key = "view.session.field.status"
fallback = "Status"
[[capabilities.run.fields]]
selector = "runId"
formatter = "string"
[capabilities.run.fields.label]
key = "view.session.field.run"
fallback = "Run"

[capabilities.stop]
kind = "detail"
[capabilities.stop.title]
key = "view.session.stop.title"
fallback = "Managed session stop"
[[capabilities.stop.fields]]
selector = "sessionId"
formatter = "string"
[capabilities.stop.fields.label]
key = "view.session.field.id"
fallback = "Session"
[[capabilities.stop.fields]]
selector = "status"
formatter = "string"
[capabilities.stop.fields.label]
key = "view.session.field.status"
fallback = "Status"

[capabilities.logs]
kind = "records"
source = "records"
[capabilities.logs.title]
key = "view.session.logs.title"
fallback = "Serial session logs"
[[capabilities.logs.columns]]
selector = "timestamp"
formatter = "string"
[capabilities.logs.columns.label]
key = "view.session.field.timestamp"
fallback = "Time"
[[capabilities.logs.columns]]
selector = "sequence"
formatter = "string"
[capabilities.logs.columns.label]
key = "view.session.field.sequence"
fallback = "#"
[[capabilities.logs.columns]]
selector = "text"
formatter = "fallback-dash"
[capabilities.logs.columns.label]
key = "view.session.field.text"
fallback = "Output"

[capabilities.send]
kind = "detail"
[capabilities.send.title]
key = "view.session.send.title"
fallback = "Serial write"
[[capabilities.send.fields]]
selector = "sessionId"
formatter = "string"
[capabilities.send.fields.label]
key = "view.session.field.id"
fallback = "Session"
[[capabilities.send.fields]]
selector = "bytesWritten"
formatter = "byte-size"
[capabilities.send.fields.label]
key = "view.session.field.bytes"
fallback = "Written"
[[capabilities.send.fields]]
selector = "framing"
formatter = "string"
[capabilities.send.fields.label]
key = "view.session.field.framing"
fallback = "Framing"

[capabilities.console]
kind = "completion"
[capabilities.console.message]
key = "view.session.console.completed"
fallback = "Console detached."
