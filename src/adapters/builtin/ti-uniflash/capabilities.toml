schema = "benchpilot.adapter.capabilities"
schema_version = 1
catalog_version = 1

[capabilities.status]
enabled = true
handler = "workflow:status"
input_schema = "empty"
output_schema = "status"
creates_run = true
timeout = "2m"
lock = "device"
[capabilities.status.safety]
mode = "caution"
description = "Loads the configured TI debug-server target configuration to query its available cores."
[capabilities.status.platforms]
windows = true
linux = false
macos = false
[capabilities.status.platform_reasons]
linux = "DSLite installation layout and direct executable contract are not yet verified on Linux."
macos = "DSLite installation layout and direct executable contract are not yet verified on macOS."

[capabilities.info]
enabled = false
reason = "Target inventory requires target-family-specific Debug Server commands that are not yet validated."
[capabilities.info.platforms]
windows = false
linux = false
macos = false

[capabilities.build]
enabled = false
reason = "UniFlash programs prebuilt images and is not a firmware build system."
[capabilities.build.platforms]
windows = false
linux = false
macos = false

[capabilities.clean]
enabled = false
reason = "UniFlash does not own project build output."
[capabilities.clean.platforms]
windows = false
linux = false
macos = false

[capabilities.fullclean]
enabled = false
reason = "UniFlash does not own project build state."
[capabilities.fullclean.platforms]
windows = false
linux = false
macos = false

[capabilities.size]
enabled = false
reason = "Image-size reporting belongs to the selected build toolchain."
[capabilities.size.platforms]
windows = false
linux = false
macos = false

[capabilities.flash]
enabled = true
handler = "action:flash"
input_schema = "flash"
output_schema = "empty"
creates_run = true
timeout = "15m"
lock = "device"
[capabilities.flash.safety]
mode = "destructive"
description = "Programs the supplied image through the configured TI debug probe and can overwrite target flash."
[capabilities.flash.platforms]
windows = true
linux = false
macos = false
[capabilities.flash.platform_reasons]
linux = "DSLite installation layout and direct executable contract are not yet verified on Linux."
macos = "DSLite installation layout and direct executable contract are not yet verified on macOS."

[capabilities.reset]
enabled = false
reason = "Reset operation names and effects differ by target and require target-family validation."
[capabilities.reset.platforms]
windows = false
linux = false
macos = false

[capabilities.run]
enabled = true
handler = "session:start"
session = "monitor"
input_schema = "session-run"
output_schema = "session-run"
creates_run = true
timeout = "30s"
lock = "session-owned"
availability_when = { path = "device.monitor_port", operator = "exists" }
[capabilities.run.safety]
mode = "caution"
description = "Opens a managed target UART session; opening a USB serial port can affect DTR or RTS."
[capabilities.run.platforms]
windows = true
linux = false
macos = false
[capabilities.run.platform_reasons]
linux = "DSLite installation layout and direct executable contract are not yet verified on Linux."
macos = "DSLite installation layout and direct executable contract are not yet verified on macOS."

[capabilities.stop]
enabled = true
handler = "session:stop"
session = "monitor"
input_schema = "session-stop"
output_schema = "session-stop"
creates_run = false
timeout = "45s"
lock = "none"
availability_when = { path = "device.monitor_port", operator = "exists" }
[capabilities.stop.safety]
mode = "normal"
[capabilities.stop.platforms]
windows = true
linux = false
macos = false
[capabilities.stop.platform_reasons]
linux = "DSLite installation layout and direct executable contract are not yet verified on Linux."
macos = "DSLite installation layout and direct executable contract are not yet verified on macOS."

[capabilities.logs]
enabled = true
handler = "session:logs"
session = "monitor"
input_schema = "session-logs"
output_schema = "session-logs"
creates_run = false
timeout = "30s"
lock = "none"
availability_when = { path = "device.monitor_port", operator = "exists" }
[capabilities.logs.safety]
mode = "normal"
[capabilities.logs.platforms]
windows = true
linux = false
macos = false
[capabilities.logs.platform_reasons]
linux = "DSLite installation layout and direct executable contract are not yet verified on Linux."
macos = "DSLite installation layout and direct executable contract are not yet verified on macOS."

[capabilities.console]
enabled = true
handler = "session:console"
session = "monitor"
input_schema = "session-console"
output_schema = "empty"
creates_run = false
timeout = "24h"
lock = "none"
tty_only = true
availability_when = { path = "device.monitor_port", operator = "exists" }
[capabilities.console.safety]
mode = "caution"
description = "Attaches terminal input to a managed UART session; target firmware may interpret typed bytes as commands."
[capabilities.console.platforms]
windows = true
linux = false
macos = false
[capabilities.console.platform_reasons]
linux = "DSLite installation layout and direct executable contract are not yet verified on Linux."
macos = "DSLite installation layout and direct executable contract are not yet verified on macOS."

[capabilities.send]
enabled = true
handler = "session:send"
session = "monitor"
input_schema = "session-send"
output_schema = "session-send"
creates_run = false
timeout = "30s"
lock = "none"
availability_when = { path = "device.monitor_port", operator = "exists" }
[capabilities.send.safety]
mode = "caution"
description = "Writes raw bytes to a managed UART session; target firmware may interpret the data as a physical control command."
[capabilities.send.platforms]
windows = true
linux = false
macos = false
[capabilities.send.platform_reasons]
linux = "DSLite installation layout and direct executable contract are not yet verified on Linux."
macos = "DSLite installation layout and direct executable contract are not yet verified on macOS."

[capabilities.request]
enabled = false
reason = "No target protocol profile is defined for UniFlash."
[capabilities.request.platforms]
windows = false
linux = false
macos = false

[capabilities.capture]
enabled = false
reason = "UniFlash flash mode does not expose a bounded generic capture capability."
[capabilities.capture.platforms]
windows = false
linux = false
macos = false

[capabilities.sync]
enabled = false
reason = "UniFlash does not synchronize project files to a target."
[capabilities.sync.platforms]
windows = false
linux = false
macos = false

[capabilities.test]
enabled = false
reason = "Test orchestration belongs to the selected project and toolchain."
[capabilities.test.platforms]
windows = false
linux = false
macos = false

[capabilities.selftest]
enabled = false
reason = "A safe self-test requires a board- and firmware-specific contract."
[capabilities.selftest.platforms]
windows = false
linux = false
macos = false

[capabilities.deploy]
enabled = false
reason = "This adapter programs prebuilt images; build-and-deploy requires a dedicated toolchain adapter."
[capabilities.deploy.platforms]
windows = false
linux = false
macos = false

[capabilities.erase]
enabled = false
reason = "Erase operation names, scope, and irreversibility vary by target and are not exposed generically."
[capabilities.erase.platforms]
windows = false
linux = false
macos = false
