[doctor]
bundleReady = "适配器包已准备就绪。"
requiredToolResolved = "必需工具已就绪。"
optionalToolResolved = "可选工具已就绪。"
requiredToolFailed = "必需工具检查失败。请配置 ESP-IDF 路径，或设置 IDF_PATH。"
optionalToolUnavailable = "可选工具不可用。"
environmentResolved = "运行环境已解析。"
environmentFailed = "无法解析 ESP-IDF 运行环境。请设置 IDF_PATH 和 IDF_PYTHON_ENV_PATH，或配置 export 脚本。"
discoveryDisabled = "设备发现已禁用。"
discoverySourceFailed = "一个或多个设备发现来源失败。"
discoveryAvailable = "被动设备发现可用。"
discoveryUnavailable = "无法初始化被动设备发现。"

[capability.build]
summary = "构建固件或应用产物。"
description = "构建已配置的 ESP-IDF 项目并保存生成的产物。"
[capability.capture]
summary = "采集设备日志或诊断输出。"
description = "从已配置的设备串口采集有边界限制的输出。"
[capability.capture.safety]
confirm = "确认此串口采集操作的安全要求。"
effect = "会打开串口进行有边界限制的采集；USB 串口适配器打开端口时可能使目标设备复位。"
[capability.capture.option.duration_seconds]
summary = "采集的最长持续时间（秒）。"
[capability.capture.option.baud]
summary = "采集时使用的串口波特率。"
[capability.capture.option.max_lines]
summary = "最多采集的行数。"
[capability.capture.option.max_bytes]
summary = "最多采集的字节数。"
[capability.capture.option.timestamp]
summary = "为每一行采集内容添加 UTC 时间戳。"
[capability.clean]
summary = "清理常规构建产物。"
description = "清理已配置项目的常规构建输出目录。"
[capability.deploy]
summary = "构建并部署到设备。"
description = "构建项目，然后将生成的固件烧录到目标设备。"
[capability.deploy.safety]
confirm = "确认此构建并烧录操作的安全要求。"
effect = "将构建并覆盖当前 ESP32-S3 的应用固件。"
[capability.flash]
summary = "烧录固件到设备。"
description = "将生成的固件烧录到已配置的目标设备。"
[capability.flash.safety]
confirm = "确认此覆盖固件操作的安全要求。"
effect = "将覆盖当前 ESP32-S3 的应用固件。"
[capability.fullclean]
summary = "清理全部生成的构建状态。"
description = "清理已配置项目的全部生成构建状态。"
[capability.fullclean.safety]
confirm = "确认此完整构建清理操作的安全要求。"
effect = "会删除已配置的项目构建目录，但不会删除 sdkconfig 或源文件。"
[capability.info]
summary = "查看目标身份与硬件信息。"
description = "读取已连接目标设备的稳定身份、闪存信息与 esptool 版本。"
[capability.info.safety]
confirm = "确认此设备连接操作的安全要求。"
effect = "连接目标设备并由 esptool 识别时，可能切换 DTR/RTS。"
[capability.reset]
summary = "复位设备。"
description = "通过 esptool 对已连接的目标设备执行硬复位。"
[capability.reset.safety]
confirm = "确认此设备复位操作的安全要求。"
effect = "会使用 esptool 连接设备，并在命令结束后对目标设备执行硬复位。"
[capability.size]
summary = "查看固件或应用大小。"
description = "读取已配置项目的固件大小报告。"
[capability.status]
summary = "检查当前设备是否就绪。"
description = "确认已配置的串口目标可达，并返回精简的就绪摘要。"
[capability.status.safety]
confirm = "确认此设备连接操作的安全要求。"
effect = "连接目标设备并由 esptool 读取状态时，可能切换 DTR/RTS。"

