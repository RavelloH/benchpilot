uses = "action:detect-esptool"
label = { key = "progress.info.detect", fallback = "Detect esptool" }
with = {}
[[workflows.info.steps]]
id = "chip-v5"
uses = "action:chip-id-v5"
progress_id = "chip"
label = { key = "progress.info.chip", fallback = "Read chip identity" }
