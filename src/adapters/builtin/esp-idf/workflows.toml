schema = "benchpilot.adapter.workflows"
schema_version = 1

[workflows.status]
timeout = "2m"
stop_on_failure = true
[[workflows.status.steps]]
id = "detect"
uses = "action:detect-esptool"
label = { key = "progress.status.detect", fallback = "Detect esptool" }
with = {}
[[workflows.status.steps]]
id = "probe"
uses = "action:probe-status"
progress_id = "probe"
label = { key = "progress.status.probe", fallback = "Probe target readiness" }
with = {}
[workflows.status.output_template]
availability = "ready"
[workflows.status.output_template.connection]
transport = "serial"
endpoint = "${device.port}"
[workflows.status.output_template.target]
model = "${result.probe.chip}"
revision = "${result.probe.revision}"
[workflows.status.output_template.tooling]
esptool = "${result.detect.version}"

[workflows.info]
timeout = "2m"
stop_on_failure = true
[[workflows.info.steps]]
id = "detect"
uses = "action:detect-esptool"
label = { key = "progress.info.detect", fallback = "Detect esptool" }
with = {}
[[workflows.info.steps]]
id = "chip"
uses = "action:probe-chip"
progress_id = "chip"
label = { key = "progress.info.chip", fallback = "Read chip identity" }
with = {}
[[workflows.info.steps]]
id = "mac"
uses = "action:probe-mac"
progress_id = "mac"
label = { key = "progress.info.mac", fallback = "Read device MAC address" }
with = {}
[[workflows.info.steps]]
id = "flash"
uses = "action:probe-status"
progress_id = "flash"
label = { key = "progress.info.flash", fallback = "Read flash identity" }
with = {}
[workflows.info.output_template.identity]
model = "${result.chip.chip}"
revision = "${result.chip.revision}"
hardware_id = "${result.mac.mac}"
[workflows.info.output_template.hardware.flash]
manufacturer = "${result.flash.flash_manufacturer}"
device = "${result.flash.flash_device}"
size = "${result.flash.flash_size}"
[workflows.info.output_template.tooling]
esptool = "${result.detect.version}"

[workflows.build]
timeout = "30m"
stop_on_failure = true
output = "metadata"
[[workflows.build.steps]]
id = "build"
uses = "action:build"
label = { key = "progress.build.compile", fallback = "Build project" }
with = {}
[[workflows.build.steps]]
id = "metadata"
uses = "action:build-metadata"
label = { key = "progress.build.metadata", fallback = "Read build metadata" }
with = {}

[workflows.size]
timeout = "5m"
stop_on_failure = true
output = "size"
[[workflows.size.steps]]
id = "size"
uses = "action:size"
label = { key = "progress.size.read", fallback = "Read firmware size" }
with = {}

[workflows.deploy]
timeout = "45m"
stop_on_failure = true
[[workflows.deploy.steps]]
id = "build"
uses = "action:build"
label = { key = "progress.deploy.compile", fallback = "Build project" }
with = {}
[[workflows.deploy.steps]]
id = "flash"
uses = "action:flash"
label = { key = "progress.deploy.flash", fallback = "Flash device" }
with = {}

[workflows.reset]
timeout = "2m"
stop_on_failure = true
[[workflows.reset.steps]]
id = "detect"
uses = "action:detect-esptool"
label = { key = "progress.reset.detect", fallback = "Detect esptool" }
with = {}
[[workflows.reset.steps]]
id = "reset-v5"
uses = "action:reset-v5"
progress_id = "reset"
label = { key = "progress.reset.device", fallback = "Reset device" }
with = {}
when = { path = "tool.esptool.probe.major", operator = "equals", value = 5 }
[[workflows.reset.steps]]
id = "reset-v4"
uses = "action:reset-v4"
progress_id = "reset"
label = { key = "progress.reset.device", fallback = "Reset device" }
with = {}
when = { path = "tool.esptool.probe.major", operator = "equals", value = 4 }
