schema = "benchpilot.adapter.installation"
schema_version = 1
provider = "eim"
stability = "experimental"
configuration_not_found_tool = "idf"

[platforms]
windows = "stable"
linux = "experimental"
macos = "experimental"

[estimate]
minimum_bytes = 5000000000
maximum_bytes = 12000000000

[[fields]]
key = "target"
summary = "Chip targets to install, separated by commas (for example esp32,esp32s3)."
required = true
separator = ","
choices = [
  { value = "esp32", label = "ESP32" },
  { value = "esp32s2", label = "ESP32-S2" },
  { value = "esp32s3", label = "ESP32-S3" },
  { value = "esp32c2", label = "ESP32-C2" },
  { value = "esp32c3", label = "ESP32-C3" },
  { value = "esp32c5", label = "ESP32-C5" },
  { value = "esp32c6", label = "ESP32-C6" },
  { value = "esp32h2", label = "ESP32-H2" },
  { value = "esp32p4", label = "ESP32-P4" },
]

[eim]
target_field = "target"

[eim.configuration]
managed_root = "root"
installation_source = "eim"
idf_version = "release"
idf_path = "idf_path"
idf_py_path = "idf_py_path"
python_path = "python_path"
export_script = "export_script"
export_bat_script = "export_bat_script"
target = "target"
installed_targets = "installed_targets"
