schema = "benchpilot.adapter.tool-discovery"
schema_version = 1

[discoveries.python]
strategy = "first-valid"
[[discoveries.python.candidates]]
id = "config"
type = "config"
priority = 100
key = "python_path"
[[discoveries.python.candidates]]
id = "idf-python-env"
type = "environment-path"
priority = 90
variable = "IDF_PYTHON_ENV_PATH"
append = ["bin", "python"]
[[discoveries.python.candidates]]
id = "path"
type = "path"
priority = 50
names = ["python3", "python"]
[[discoveries.python.candidates]]
id = "windows-idf-python"
type = "glob"
priority = 10
patterns = ["C:/Espressif/python_env/idf*_py*_env/Scripts/python.exe"]
[discoveries.python.candidates.platforms]
windows = true
linux = false
macos = false
[discoveries.python.validation]
path_type = "file"
executable = true
[discoveries.python.probe]
args = ["--version"]
parser = "python-version"
timeout = "10s"

[discoveries.idf]
strategy = "first-valid"
[[discoveries.idf.candidates]]
id = "config-idf-py"
type = "config"
priority = 100
key = "idf_py_path"
[[discoveries.idf.candidates]]
id = "config-idf-root"
type = "config-path"
priority = 90
key = "idf_path"
append = ["tools", "idf.py"]
[[discoveries.idf.candidates]]
id = "idf-path"
type = "environment-path"
priority = 80
variable = "IDF_PATH"
append = ["tools", "idf.py"]
[[discoveries.idf.candidates]]
id = "path"
type = "path"
priority = 50
names = ["idf.py"]
[[discoveries.idf.candidates]]
id = "windows-idf"
type = "glob"
priority = 10
patterns = ["C:/Espressif/frameworks/esp-idf-v*/tools/idf.py"]
[discoveries.idf.candidates.platforms]
windows = true
linux = false
macos = false
[discoveries.idf.validation]
path_type = "file"
executable = false
[discoveries.idf.probe]
args = ["--version"]
parser = "idf-version"
timeout = "15s"

[discoveries.esptool]
strategy = "first-valid"
[[discoveries.esptool.candidates]]
id = "python-module"
type = "config"
priority = 100
key = "python_path"
[[discoveries.esptool.candidates]]
id = "idf-python-env"
type = "environment-path"
priority = 90
variable = "IDF_PYTHON_ENV_PATH"
append = ["bin", "python"]
[[discoveries.esptool.candidates]]
id = "path"
type = "path"
priority = 50
names = ["python3", "python"]
[discoveries.esptool.validation]
path_type = "file"
executable = true
[discoveries.esptool.probe]
args = ["version"]
parser = "esptool-version"
timeout = "10s"
