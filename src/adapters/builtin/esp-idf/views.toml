schema = "benchpilot.adapter.views"
schema_version = 1

[capabilities.status]
kind = "detail"
[capabilities.status.title]
key = "view.status.title"
fallback = "Device readiness"
[[capabilities.status.fields]]
selector = "connection.endpoint"
formatter = "string"
[capabilities.status.fields.label]
key = "view.status.field.endpoint"
fallback = "Endpoint"
[[capabilities.status.fields]]
selector = "target.model"
formatter = "string"
[capabilities.status.fields.label]
key = "view.status.field.model"
fallback = "Target"
[[capabilities.status.fields]]
selector = "target.revision"
formatter = "string"
[capabilities.status.fields.label]
key = "view.status.field.revision"
fallback = "Revision"
[[capabilities.status.fields]]
selector = "tooling.esptool"
formatter = "string"
[capabilities.status.fields.label]
key = "view.status.field.esptool"
fallback = "esptool"

[capabilities.info]
kind = "detail"
[capabilities.info.title]
key = "view.info.title"
fallback = "Device inventory"
[[capabilities.info.fields]]
selector = "identity.model"
formatter = "string"
[capabilities.info.fields.label]
key = "view.info.field.model"
fallback = "Model"
[[capabilities.info.fields]]
selector = "identity.revision"
formatter = "string"
[capabilities.info.fields.label]
key = "view.info.field.revision"
fallback = "Revision"
[[capabilities.info.fields]]
selector = "identity.hardware_id"
formatter = "string"
[capabilities.info.fields.label]
key = "view.info.field.hardware_id"
fallback = "Hardware ID"
[[capabilities.info.fields]]
selector = "hardware.flash.manufacturer"
formatter = "string"
[capabilities.info.fields.label]
key = "view.info.field.flash_manufacturer"
fallback = "Flash manufacturer"
[[capabilities.info.fields]]
selector = "hardware.flash.device"
formatter = "string"
[capabilities.info.fields.label]
key = "view.info.field.flash_device"
fallback = "Flash device"
[[capabilities.info.fields]]
selector = "hardware.flash.size"
formatter = "string"
[capabilities.info.fields.label]
key = "view.info.field.flash_size"
fallback = "Flash size"
[[capabilities.info.fields]]
selector = "tooling.esptool"
formatter = "string"
[capabilities.info.fields.label]
key = "view.info.field.esptool"
fallback = "esptool"

[capabilities.build]
kind = "detail"
[capabilities.build.title]
key = "view.build.title"
fallback = "Build summary"
[[capabilities.build.fields]]
selector = "project_name"
