schema = "benchpilot.adapter.views"
schema_version = 1

[capabilities.status]
kind = "table"
[capabilities.status.title]
key = "view.status.title"
fallback = "Device status"
[capabilities.status.keys.version]
key = "view.info.key.version"
fallback = "Version"
[capabilities.status.keys.major]
key = "view.info.key.major"
fallback = "Major version"
[capabilities.status.keys.chip]
key = "view.info.key.chip"
fallback = "Chip"
[capabilities.status.keys.revision]
key = "view.info.key.revision"
fallback = "Revision"
[capabilities.status.keys.mac]
key = "view.info.key.mac"
fallback = "MAC address"
[capabilities.status.keys.flash_manufacturer]
key = "view.info.key.flash_manufacturer"
fallback = "Flash manufacturer"
[capabilities.status.keys.flash_device]
key = "view.info.key.flash_device"
fallback = "Flash device"
[capabilities.status.keys.flash_size]
key = "view.info.key.flash_size"
fallback = "Flash size"

[capabilities.info]
kind = "table"
[capabilities.info.title]
key = "view.info.title"
fallback = "ESP-IDF information"
[capabilities.info.keys.version]
key = "view.info.key.version"
fallback = "Version"
[capabilities.info.keys.major]
key = "view.info.key.major"
fallback = "Major version"
[capabilities.info.keys.chip]
key = "view.info.key.chip"
fallback = "Chip"
[capabilities.info.keys.revision]
key = "view.info.key.revision"
fallback = "Revision"
[capabilities.info.keys.mac]
key = "view.info.key.mac"
fallback = "MAC address"
[capabilities.info.keys.flash_manufacturer]
key = "view.info.key.flash_manufacturer"
fallback = "Flash manufacturer"
[capabilities.info.keys.flash_device]
key = "view.info.key.flash_device"
fallback = "Flash device"
[capabilities.info.keys.flash_size]
key = "view.info.key.flash_size"
fallback = "Flash size"

[capabilities.build]
kind = "detail"
[capabilities.build.title]
key = "view.build.title"
fallback = "Build summary"
[[capabilities.build.fields]]
selector = "project_name"
formatter = "string"
[capabilities.build.fields.label]
key = "view.field.project_name"
fallback = "Project"
[[capabilities.build.fields]]
selector = "project_version"
formatter = "string"
[capabilities.build.fields.label]
key = "view.field.project_version"
fallback = "Version"
[[capabilities.build.fields]]
selector = "target"
formatter = "string"
[capabilities.build.fields.label]
key = "view.field.target"
fallback = "Target"
[[capabilities.build.fields]]
selector = "idf_version"
formatter = "string"
[capabilities.build.fields.label]
key = "view.field.idf_version"
fallback = "ESP-IDF"
[[capabilities.build.fields]]
selector = "application_bin"
formatter = "string"
[capabilities.build.fields.label]
key = "view.field.application_bin"
fallback = "Application"
[[capabilities.build.fields]]
selector = "flash_size"
formatter = "string"
[capabilities.build.fields.label]
key = "view.field.flash_size"
fallback = "Flash size"
[[capabilities.build.fields]]
selector = "flash_file_count"
formatter = "string"
[capabilities.build.fields.label]
key = "view.field.flash_file_count"
fallback = "Flash files"

[capabilities.clean]
kind = "completion"
[capabilities.clean.message]
key = "view.clean.completed"
fallback = "Build artifacts cleaned."

[capabilities.fullclean]
kind = "completion"
[capabilities.fullclean.message]
key = "view.fullclean.completed"
fallback = "Generated build state cleaned."

[capabilities.size]
kind = "detail"
[capabilities.size.title]
key = "view.size.title"
fallback = "Firmware size"
[[capabilities.size.fields]]
selector = "flash_code_bytes"
formatter = "byte-size"
[capabilities.size.fields.label]
key = "view.field.flash_code"
fallback = "Flash code"
[[capabilities.size.fields]]
selector = "flash_data_bytes"
formatter = "byte-size"
[capabilities.size.fields.label]
key = "view.field.flash_data"
fallback = "Flash data"
[[capabilities.size.fields]]
selector = "ram_bytes"
formatter = "byte-size"
[capabilities.size.fields.label]
key = "view.field.ram"
fallback = "RAM"
[[capabilities.size.fields]]
selector = "image_bytes"
formatter = "byte-size"
[capabilities.size.fields.label]
key = "view.field.image"
fallback = "Image"

[capabilities.flash]
kind = "tree"
[capabilities.flash.title]
key = "view.flash.title"
fallback = "Flash output"

[capabilities.reset]
kind = "completion"
[capabilities.reset.message]
key = "view.reset.completed"
fallback = "Device reset completed."

[capabilities.deploy]
kind = "tree"
[capabilities.deploy.title]
key = "view.deploy.title"
fallback = "Deploy output"

[capabilities.capture]
kind = "detail"
[capabilities.capture.title]
key = "view.capture.title"
fallback = "Capture summary"
[[capabilities.capture.fields]]
selector = "lines"
formatter = "string"
[capabilities.capture.fields.label]
key = "view.field.lines"
fallback = "Lines"
[[capabilities.capture.fields]]
selector = "bytes"
formatter = "string"
[capabilities.capture.fields.label]
key = "view.field.bytes"
fallback = "Bytes"
[[capabilities.capture.fields]]
selector = "stop_reason"
formatter = "string"
[capabilities.capture.fields.label]
key = "view.field.stop_reason"
fallback = "Stop reason"
