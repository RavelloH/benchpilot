schema = "benchpilot.adapter.actions"
schema_version = 1

[actions.discover-ports]
type = "process"
tool = "python"
cwd = "${project.root}"
timeout = "10s"
parser = "discovery-json"
arguments = [
  { kind = "literal", value = "-c" },
  { kind = "literal", value = '''import json
from serial.tools import list_ports
def text(value): return value if value is not None else ""
def hex4(value): return f"{value:04X}" if value is not None else ""
ports = [{"port": item.device, "description": text(item.description), "hwid": text(item.hwid), "vid": hex4(item.vid), "pid": hex4(item.pid), "serial_number": text(item.serial_number), "manufacturer": text(item.manufacturer), "product": text(item.product), "location": text(item.location)} for item in list_ports.comports()]
print(json.dumps({"devices": ports}, sort_keys=True))''' }
]

[actions.python-version]
type = "process"
tool = "python"
cwd = "${project.root}"
timeout = "10s"
parser = "python-version"
arguments = [{ kind = "literal", value = "--version" }]

[actions.idf-version]
type = "process"
tool = "idf"
cwd = "${project.root}"
timeout = "15s"
parser = "idf-version"
arguments = [{ kind = "literal", value = "--version" }]

[actions.build]
type = "process"
tool = "idf"
cwd = "${project.root}"
timeout = "30m"
artifact_set = "build"
parser = "idf-build"
arguments = [
  { kind = "option", flag = "-B", value = "${config.build_dir}" },
  { kind = "value", value = "-DIDF_TARGET=${config.target}" },
  { kind = "literal", value = "build" }
]

[actions.build-metadata]
type = "process"
tool = "python"
cwd = "${project.root}"
timeout = "30s"
parser = "metadata-json"
arguments = [
  { kind = "literal", value = "-c" },
  { kind = "literal", value = '''import json, os, sys
build = os.path.join(os.getcwd(), sys.argv[1])
def load(name):
  with open(os.path.join(build, name), encoding="utf-8") as stream: return json.load(stream)
description = load("project_description.json")
flasher = load("flasher_args.json")
settings = flasher.get("flash_settings", {})
print(json.dumps({
  "project_name": str(description.get("project_name", "")),
  "project_version": str(description.get("project_version", "")),
  "target": str(description.get("target", "")),
  "idf_version": str(description.get("git_revision", "")),
  "application_bin": str(description.get("app_bin", "")),
  "flash_size": str(settings.get("flash_size", "")),
  "flash_file_count": len(flasher.get("flash_files", {}))
}, sort_keys=True))''' },
  { kind = "value", value = "${config.build_dir}" }
]

