[actions.capture]
type = "process"
tool = "python"
cwd = "${project.root}"
timeout = "25s"
parser = "serial-capture"
arguments = [
  { kind = "literal", value = "-c" },
  { kind = "literal", value = '''import sys, time
import serial

port, baud, duration, max_lines = sys.argv[1], int(sys.argv[2]), float(sys.argv[3]), int(sys.argv[4])
lines = []
try:
  connection = serial.Serial(port=port, baudrate=baud, timeout=0.2, rtscts=False, dsrdtr=False)
  try:
    connection.dtr = False
    connection.rts = False
  except (AttributeError, serial.SerialException):
    pass
  try:
    deadline = time.monotonic() + duration
    while time.monotonic() < deadline and len(lines) < max_lines:
      raw = connection.readline()
      if not raw:
        continue
      line = raw.decode("utf-8", errors="replace").rstrip("\\r\\n")
      lines.append(line)
      print(line, flush=True)
      if "BENCHPILOT_ESP32S3_OK" in line:
        break
  finally:
    connection.close()
except (OSError, serial.SerialException) as error:
  print(str(error), file=sys.stderr, flush=True)
  raise SystemExit(2)

print(f"capture.lines={len(lines)}")
print(f"capture.marker={'true' if any('BENCHPILOT_ESP32S3_OK' in line for line in lines) else 'false'}")''' },
  { kind = "value", value = "${device.port}" },
  { kind = "value", value = "${input.baud}" },
  { kind = "value", value = "${input.duration_seconds}" },
  { kind = "value", value = "${input.max_lines}" }
]
