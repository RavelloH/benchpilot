schema = "benchpilot.adapter.actions"
schema_version = 1

[actions.discover-ports]
type = "process"
tool = "python"
cwd = "${project.root}"
timeout = "10s"
parser = "discovery-json"
arguments = [
  { kind = "literal", value = "-c" },
  { kind = "literal", value = '''import json
from serial.tools import list_ports
def text(value): return value if value is not None else ""
def hex4(value): return f"{value:04X}" if value is not None else ""
ports = [{"port": item.device, "description": text(item.description), "hwid": text(item.hwid), "vid": hex4(item.vid), "pid": hex4(item.pid), "serial_number": text(item.serial_number), "manufacturer": text(item.manufacturer), "product": text(item.product), "location": text(item.location)} for item in list_ports.comports()]
print(json.dumps({"devices": ports}, sort_keys=True))''' }
]

[actions.status]
type = "process"
tool = "python"
cwd = "${project.root}"
timeout = "30s"
parser = "status-json"
arguments = [
  { kind = "literal", value = "-c" },
  { kind = "literal", value = '''import json, os, sys
root = os.getcwd(); build = os.path.join(root, sys.argv[1])
target = ""
sdkconfig = os.path.join(root, "sdkconfig")
if os.path.isfile(sdkconfig):
  with open(sdkconfig, encoding="utf-8", errors="replace") as stream:
    for line in stream:
      if line.startswith("CONFIG_IDF_TARGET="):
        target = line.partition("=")[2].strip().strip('"')
        break
print(json.dumps({"project": root, "cmake_lists": os.path.isfile(os.path.join(root, "CMakeLists.txt")), "sdkconfig": os.path.isfile(sdkconfig), "target": target, "build_dir": sys.argv[1], "project_description": os.path.isfile(os.path.join(build, "project_description.json")), "flasher_args": os.path.isfile(os.path.join(build, "flasher_args.json"))}, sort_keys=True))''' },
  { kind = "value", value = "${config.build_dir}" }
]

[actions.python-version]
type = "process"
tool = "python"
cwd = "${project.root}"
timeout = "10s"
parser = "python-version"
arguments = [{ kind = "literal", value = "--version" }]

[actions.idf-version]
type = "process"
tool = "idf"
