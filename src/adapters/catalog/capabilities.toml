version = 1

[capabilities.status]
description = "Probe current target readiness and connection state."
output_contract = "status-report"
[capabilities.info]
description = "Return a detailed target identity and inventory report."
output_contract = "info-report"
[capabilities.build]
description = "Build firmware or application artifacts."
[capabilities.clean]
description = "Remove normal build output."
[capabilities.fullclean]
description = "Remove all generated build state."
[capabilities.size]
description = "Report firmware or application size."
[capabilities.flash]
description = "Write firmware to a physical target."
[capabilities.reset]
description = "Reset a physical target."
[capabilities.run]
description = "Start an application or target."
[capabilities.stop]
description = "Stop an application or target."
[capabilities.logs]
description = "Stream target logs."
[capabilities.console]
description = "Attach a human terminal to a managed target session."
[capabilities.send]
description = "Send a bounded raw message through a managed target session."
[capabilities.request]
description = "Send a structured request through a declared target protocol."
[capabilities.capture]
description = "Capture logs or other diagnostic output."
[capabilities.sync]
description = "Synchronize project files to a target."
[capabilities.test]
description = "Run project or target tests."
[capabilities.selftest]
description = "Run a target health check."
[capabilities.deploy]
description = "Build and deploy a project."
[capabilities.erase]
description = "Erase device storage or firmware."
